<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Gravity Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050508;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #controls {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(10, 10, 18, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            /* Grey border line removed here */
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 13px;
            width: 220px;
            z-index: 10;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-weight: 500;
        }
        .control-group label span {
            color: #00ffcc;
            font-family: monospace;
        }
        input[type=range] {
            width: 100%;
            accent-color: #00ffcc;
            cursor: pointer;
            background: #1a1a24;
            height: 6px;
            border-radius: 3px;
            appearance: none;
        }
        button {
            background: #ff3366;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
            margin-top: 5px;
        }
        button:hover {
            background: #ff5588;
        }
        button:active {
            transform: scale(0.98);
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label>Particles: <span id="count-val">600</span></label>
            <input type="range" id="particle-count" min="100" max="1500" value="600">
        </div>
        <div class="control-group">
            <label>Gravity Pull: <span id="gravity-val">5</span></label>
            <input type="range" id="gravity-strength" min="1" max="15" value="5">
        </div>
        <div class="control-group">
            <label>Friction / Trail: <span id="tail-val">0.12</span></label>
            <input type="range" id="tail-length" min="0.02" max="0.4" step="0.01" value="0.12">
        </div>
        <button id="clear-btn">Clear Gravity Wells</button>
    </div>

    <div id="instructions">Click anywhere to create a gravity well!</div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let particles = [];
        let wells = [];

        const countInput = document.getElementById('particle-count');
        const gravityInput = document.getElementById('gravity-strength');
        const tailInput = document.getElementById('tail-length');
        const clearBtn = document.getElementById('clear-btn');

        const countVal = document.getElementById('count-val');
        const gravityVal = document.getElementById('gravity-val');
        const tailVal = document.getElementById('tail-val');

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.color = `hsl(${160 + Math.random() * 60}, 100%, 65%)`;
                this.size = Math.random() * 1.5 + 0.5;
            }

            update(gStrength) {
                wells.forEach(well => {
                    const dx = well.x - this.x;
                    const dy = well.y - this.y;
                    const distanceSq = dx * dx + dy * dy + 1000;
                    const distance = Math.sqrt(distanceSq);
                    const force = (gStrength * 50) / distanceSq;
                    
                    this.vx += (dx / distance) * force;
                    this.vy += (dy / distance) * force;
                });

                this.vx *= 0.995;
                this.vy *= 0.995;

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function adjustParticleCount() {
            const target = parseInt(countInput.value);
            countVal.textContent = target;
            if (particles.length < target) {
                while (particles.length < target) particles.push(new Particle());
            } else if (particles.length > target) {
                particles.splice(target);
            }
        }

        adjustParticleCount();

        function animate() {
            const alpha = parseFloat(tailInput.value);
            tailVal.textContent = alpha;
            ctx.fillStyle = `rgba(5, 5, 8, ${alpha})`;
            ctx.fillRect(0, 0, width, height);

            const gStrength = parseInt(gravityInput.value);
            gravityVal.textContent = gStrength;

            wells.forEach(well => {
                ctx.beginPath();
                ctx.arc(well.x, well.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ff3366';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff3366';
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            particles.forEach(p => {
                p.update(gStrength);
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('click', (e) => {
            if (e.target.closest('#controls')) return;
            wells.push({ x: e.clientX, y: e.clientY });
        });

        clearBtn.addEventListener('click', () => {
            wells = [];
        });

        countInput.addEventListener('input', adjustParticleCount);

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles.forEach(p => p.reset());
        });

        animate();
    </script>
</body>
</html>
