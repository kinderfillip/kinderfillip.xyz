<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mymy Gravity Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050508;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #controls {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(10, 10, 18, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 13px;
            width: 220px;
            z-index: 10;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-weight: 500;
        }
        .control-group label span {
            color: #00ffcc;
            font-family: monospace;
        }
        input[type=range] {
            width: 100%;
            accent-color: #00ffcc;
            cursor: pointer;
            background: #1a1a24;
            height: 6px;
            border-radius: 3px;
            appearance: none;
        }
        button {
            background: #ff3366;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
            margin-top: 5px;
        }
        button:hover {
            background: #ff5588;
        }
        button:active {
            transform: scale(0.98);
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label>Particles: <span id="count-val">600</span></label>
            <input type="range" id="particle-count" min="100" max="1500" value="600">
        </div>
        <div class="control-group">
            <label>Gravity Pull: <span id="gravity-val">5</span></label>
            <input type="range" id="gravity-strength" min="1" max="15" value="5">
        </div>
        <!-- New Size Adjustment Slider -->
        <div class="control-group">
            <label>Picture Size: <span id="size-val">55</span></label>
            <input type="range" id="picture-size" min="15" max="120" value="55">
        </div>
        <button id="clear-btn">Clear Gravity Wells</button>
    </div>

    <div id="instructions">Click anywhere to create a gravity well!</div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let particles = [];
        let wells = [];

        const mymyImg = new Image();
        mymyImg.src = 'https://static.wikia.nocookie.net/ongezellig/images/4/42/Mymyhome.png';

        const countInput = document.getElementById('particle-count');
        const gravityInput = document.getElementById('gravity-strength');
        const sizeInput = document.getElementById('picture-size');
        const clearBtn = document.getElementById('clear-btn');

        const countVal = document.getElementById('count-val');
        const gravityVal = document.getElementById('gravity-val');
        const sizeVal = document.getElementById('size-val');

        // Cache the size globally to avoid reading from DOM inside the animation frame
        let globalSize = parseInt(sizeInput.value);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                // Gives each individual sprite a slightly unique size scaling factor
                this.sizeModifier = Math.random() * 0.4 + 0.8; 
            }

            update(gStrength) {
                const currentSize = globalSize * this.sizeModifier;

                wells.forEach(well => {
                    const dx = well.x - this.x;
                    const dy = well.y - this.y;
                    const distanceSq = dx * dx + dy * dy + 1000;
                    const distance = Math.sqrt(distanceSq);
                    const force = (gStrength * 50) / distanceSq;
                    
                    this.vx += (dx / distance) * force;
                    this.vy += (dy / distance) * force;
                });

                this.vx *= 0.995;
                this.vy *= 0.995;

                this.x += this.vx;
                this.y += this.vy;

                // Dynamic wrapping based on current size
                if (this.x < -currentSize) this.x = width + currentSize;
                if (this.x > width + currentSize) this.x = -currentSize;
                if (this.y < -currentSize) this.y = height + currentSize;
                if (this.y > height + currentSize) this.y = -currentSize;
            }

            draw() {
                if (mymyImg.complete) {
                    const currentSize = globalSize * this.sizeModifier;
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    const angle = Math.atan2(this.vy, this.vx) + Math.PI / 2;
                    ctx.rotate(angle);
                    
                    ctx.drawImage(mymyImg, -currentSize / 2, -currentSize / 2, currentSize, currentSize);
                    ctx.restore();
                }
            }
        }

        function adjustParticleCount() {
            const target = parseInt(countInput.value);
            countVal.textContent = target;
            if (particles.length < target) {
                while (particles.length < target) particles.push(new Particle());
            } else if (particles.length > target) {
                particles.splice(target);
            }
        }

        gravityInput.addEventListener('input', () => {
            gravityVal.textContent = gravityInput.value;
        });

        // Event listener to dynamically update the size values efficiently
        sizeInput.addEventListener('input', () => {
            globalSize = parseInt(sizeInput.value);
            sizeVal.textContent = globalSize;
        });

        adjustParticleCount();

        function animate() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, width, height);

            const gStrength = parseInt(gravityInput.value);

            // Draw Radiant Gravity Wells
            wells.forEach(well => {
                ctx.save();
                
                ctx.beginPath();
                ctx.arc(well.x, well.y, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#ff3366';
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#ff3366';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(well.x, well.y, 8, 0, Math.PI * 2);
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff3366';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(well.x, well.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#ffffff';
                ctx.fill();

                ctx.restore();
            });

            // Update and Draw Mymy Sprites
            particles.forEach(p => {
                p.update(gStrength);
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('click', (e) => {
            if (e.target.closest('#controls')) return;
            wells.push({ x: e.clientX, y: e.clientY });
        });

        clearBtn.addEventListener('click', () => {
            wells = [];
        });

        countInput.addEventListener('input', adjustParticleCount);

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles.forEach(p => p.reset());
        });

        animate();
    </script>
</body>
</html>
